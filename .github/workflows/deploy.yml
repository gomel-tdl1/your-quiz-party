name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные для публикации на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно идёт только один деплой
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Секреты заданы как Environment secrets окружения github-pages,
    # поэтому build-джоба тоже должна объявить это окружение, иначе их не увидит.
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      # Инициализирует/включает Pages для репозитория (официальный шаг)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Значения берутся из Secrets репозитория (Settings → Secrets → Actions).
          # Анон-ключ Supabase публичный — попадание в бандл это нормально.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
